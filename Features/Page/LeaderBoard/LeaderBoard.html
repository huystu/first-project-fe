<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quizy</title>
    <link rel="stylesheet" href="../../Style/LeaderBoard/LeaderBoard.css" />
  </head>
  <body>
    <header class="header">
      <div class="quiz-header">
        <div>Quiz topic</div>
        <div>Question: 10/10</div>
      </div>
    </header>
    
    <button class="back-button">Back to home</button>

    <main class="main-content">
      <div class="leaderboard-container">
        <h2 class="leaderboard-title">Leader board</h2>
        <ul class="player-list">
          <li class="player-item rank-1">
            <span class="player-rank">1</span>
            <div class="player-avatar"></div>
            <span class="player-name">Name Player</span>
            <span class="player-score">3000</span>
          </li>
          <li class="player-item rank-2">
            <span class="player-rank">2</span>
            <div class="player-avatar"></div>
            <span class="player-name">Name Player</span>
            <span class="player-score">3000</span>
          </li>
          <li class="player-item rank-3">
            <span class="player-rank">3</span>
            <div class="player-avatar"></div>
            <span class="player-name">Name Player</span>
            <span class="player-score">3000</span>
          </li>
          <li class="player-item rank-4">
            <span class="player-rank">4</span>
            <div class="player-avatar"></div>
            <span class="player-name">Name Player</span>
            <span class="player-score">3000</span>
          </li>
          <li class="player-item rank-5">
            <span class="player-rank">5</span>
            <div class="player-avatar"></div>
            <span class="player-name">Name Player</span>
            <span class="player-score">3000</span>
          </li>
        </ul>
        <p class="rank-message">You were ranked 3th!</p>
      </div>

      <div class="score-summary">
        <span class="correct-score">8/10</span>
        <span class="wrong-score">2/10</span>
        <span class="total-score">2400</span>
      </div>
    </main>
  </body>
</html>
