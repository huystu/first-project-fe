<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Leaderboard</title>
  <link rel="stylesheet" href="../../Style/LeaderBoard/LeaderBoard.css">
</head>

<body>

  <!-- Header riêng biệt cho LeaderBoard -->
  <header class="header leaderboard-header">
    <div class="logo">
      <img src="../../Assets/Img/ImgHomePage/logo.svg" alt="Quizy">
    </div>
    <div class="join-game">
      <div class="join-game-content">
        <h1>Join Game? Enter PIN:</h1>
        <input type="text" placeholder="123 456" class="pin-input">
      </div>
      <button class="search-btn">
        <img src="../../Assets/Img/ImgHomePage/search.svg" alt="Search">
      </button>
    </div>
    <button class="signin-btn" id="signin-btn">Sign in</button>
    <button class="signout-btn" id="signout-btn" style="display: none;">Sign out</button>

  </header>

  <div class="container">
    <!-- Quiz Info -->
    <div class="quiz-info">
      <h1 id="quizTitle">Quiz Title</h1>
      <p id="quizDescription">Quiz Description</p>
    </div>

    <!-- Top Players Section -->
    <div class="leaderboard-section">
      <h2>Top Players 🏆</h2>
      <div class="leaderboard-table">
        <table>
          <thead>
            <tr>
              <th>Rank</th>
              <th>Player</th>
              <th>Score</th>
              <th>Time</th>
              <th>Date</th>
            </tr>
          </thead>
          <tbody id="leaderboardBody">
            <!-- Will be populated by JavaScript -->
          </tbody>
        </table>
      </div>
    </div>

    <!-- Your Results Section -->
    <div class="results-section">
      <h2>Your Results </h2>
      <div class="results-summary">
        <div class="summary-item1">
          <span class="label">Final Score 🏆 </span>
          <span class="value" id="finalScore">0</span>
        </div>
        <div class="summary-item2">
          <span class="label">Correct Answers ✅</span>
          <span class="value" id="correctAnswers">0/0</span>
        </div>
        <div class="summary-item3">
          <span class="label">Time Taken ⏰</span>
          <span class="value" id="timeTaken">0:00</span>
        </div>
      </div>

      <!-- Detailed Results -->
      <div class="detailed-results">
        <h3>Question Details</h3>
        <div class="questions-container" id="questionsContainer">
          <!-- Will be populated by JavaScript -->
        </div>
      </div>
    </div>

    <!-- Action Buttons -->
    <div class="action-buttons">
      <button class="btn play-again" onclick="playAgain()">Play Again</button>
    </div>
  </div>

  <script src="LeaderBoard.js"></script>
</body>

</html>
