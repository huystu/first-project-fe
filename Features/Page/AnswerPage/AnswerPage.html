<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Interface</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&display=swap">
    <link rel="stylesheet" href="../../Style/AnswerPage/AnswerPage.css">
    <script defer src="Play.js"></script>
</head>

<body>
    <div class="header">
        <div class="quiz-title" id="quizTitle">Quiz topic</div>
        <div class="question-number" id="questionNumber">Question: 1/10</div>
    </div>

    <div class="container">
        <div class="TimeAndQuestion">
            <div class="timer-container">
                <div class="timer" id="timer">10</div>
            </div>
            <div class="question-container">
                <div class="question" id="questionText">Loading question...</div>
            </div>
        </div>
        <div class="options">
            <div class="option-column left-options">
                <button class="option red" id="optionA" data-choice="A">A:</button>
                <button class="option blue" id="optionC" data-choice="C">C:</button>
            </div>
            <div class="option-column right-options">
                <button class="option yellow" id="optionB" data-choice="B">B:</button>
                <button class="option green" id="optionD" data-choice="D">D:</button>
            </div>
        </div>
    </div>
</body>

</html>
