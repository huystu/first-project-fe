<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Interface</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&display=swap">
    <link rel="stylesheet" href="../../Style/AnswerPage/AnswerPage.css">
</head>

<body>
    <div class="header">
        <div class="quiz-title">Quiz topic</div>
        <div class="question-number">Question: 1/10</div>
    </div>

    <div class="container">
        <div class="TimeAndQuestion">
            <!-- Hàng chứa timer -->
            <div class="timer-container">
                <div class="timer">10</div>
            </div>

            <!-- Hàng chứa câu hỏi -->
            <div class="question-container">
                <div class="question">Question 1:<br>Lorem ipsum?</div>
            </div>
        </div>
        <div class="options">
            <!-- Nhóm A & C bên trái -->
            <div class="option-column left-options">
                <button class="option red option-a">A: Lorem ipsum </button>
                <button class="option blue option-c">C: Lorem ipsum</button>
            </div>

            <!-- Nhóm B & D bên phải -->
            <div class="option-column right-options">
                <button class="option yellow option-b">B: Lorem ipsum</button>
                <button class="option green option-d">D: Lorem ipsum</button>
            </div>
        </div>
    </div>
</body>

</html>
